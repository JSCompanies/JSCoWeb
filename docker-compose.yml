services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./src:/app/src
      - ./blog:/app/blog
      - ./public:/app/public
      - ./astro.config.mjs:/app/astro.config.mjs
    environment:
      - NODE_ENV=development
    develop:
      watch:
        - path: ./src
          action: sync
        - path: ./blog
          action: sync
        - path: ./public
          action: sync
        - path: ./astro.config.mjs
          action: rebuild
